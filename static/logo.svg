<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean, modern shield logo -->
  <defs>
    <linearGradient id="shieldGradient" x1="400" y1="100" x2="400" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="checkGradient" x1="300" y1="450" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path 
    d="M400 100 C400 100 150 200 150 400 C150 550 250 650 400 700 C550 650 650 550 650 400 C650 200 400 100 400 100 Z" 
    fill="url(#shieldGradient)"
  />
  
  <!-- Inner highlight -->
  <path 
    d="M400 130 C400 130 180 220 180 400 C180 530 270 620 400 665 C530 620 620 530 620 400 C620 220 400 130 400 130 Z" 
    fill="rgba(255,255,255,0.1)"
  />
  
  <!-- Checkmark -->
  <path 
    d="M280 400 L360 480 L520 320" 
    stroke="url(#checkGradient)" 
    stroke-width="50" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
  />
  
  <!-- Checkmark white highlight -->
  <path 
    d="M280 400 L360 480 L520 320" 
    stroke="rgba(255,255,255,0.3)" 
    stroke-width="15" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
  />
</svg>
